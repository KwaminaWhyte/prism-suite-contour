[package]
name = "contour-app"
version.workspace = true
edition.workspace = true
license.workspace = true
default-run = "contour"

[[bin]]
name = "contour"
path = "src/main.rs"

[dependencies]
pigment-core.workspace = true
serde.workspace = true
log.workspace = true
env_logger.workspace = true
anyhow.workspace = true

serde_json = "1"
kurbo = "0.11"

# eframe with the default glow backend — Contour draws vectors through egui's
# painter, so no custom GPU pass is needed.
eframe = "0.34"
egui = "0.34"

# Native file save dialog.
rfd = "0.15"
egui-phosphor = "0.12.0"

[lints]
workspace = true
